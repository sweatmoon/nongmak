<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>농막 도면 생성</title>
    <meta name="description" content="농막 및 정화조 설치를 위한 제출용 도면과 서류를 자동 생성합니다." />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;600;700&display=swap" rel="stylesheet" />
    <!-- 카카오 주소검색 -->
    <script src="https://t1.daumcdn.net/mapjsapi/bundle/postcode/prod/postcode.v2.js"></script>
    <!-- 카카오 Maps SDK: 로드 완료 시 전역 플래그 세팅 -->
    <script>
      window.__kakaoMapsReady = false;
      window.__kakaoMapsError = false;
    </script>
    <script
      type="text/javascript"
      src="https://dapi.kakao.com/v2/maps/sdk.js?appkey=1b58d446b942d9f53e871c9b8376d302&libraries=services"
      onload="window.__kakaoMapsReady = true; console.log('[Kakao] SDK onload 완료, kakao.maps:', typeof window.kakao?.maps);"
      onerror="window.__kakaoMapsError = true; console.error('[Kakao] SDK 로드 실패 (onerror)');"
    ></script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
